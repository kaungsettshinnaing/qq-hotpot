name: Build & Deploy

on:
  push:
    branches: [main, uat]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run lint --if-present

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Environment-specific tags so UAT and prod never share a moving tag.
          #   main -> :prod   uat -> :uat   (plus an immutable :sha-xxxxxxx for both)
          tags: |
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=uat,enable=${{ github.ref == 'refs/heads/uat' }}
            type=sha,format=short

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # main -> production (app.qqhotpotbbq.com)
  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy to production over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/qq-hotpot
            git pull --ff-only || true
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d
            # Safe by default: fails loudly if a schema change would drop data.
            # For an intentional destructive change, run once by hand with --accept-data-loss.
            docker compose exec -T app npx prisma db push
            docker image prune -f

  # uat -> UAT (uat.qqhotpotbbq.com)
  deploy-uat:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/uat' && vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy to UAT over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/qq-hotpot-uat
            git pull --ff-only || true
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            dc="docker compose -f docker-compose.uat.yml --project-name qq-uat --env-file .env.uat"
            $dc pull
            $dc up -d
            $dc exec -T app npx prisma db push
            docker image prune -f
