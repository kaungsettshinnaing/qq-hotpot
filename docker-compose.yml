# QQ Hotpot BBQ — production stack for the Hostinger VPS.
#   1) copy .env.example -> .env and fill values
#   2) docker compose up -d --build

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-Asia/Yangon}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      APP_URL: ${APP_URL:-https://qqhotpotbbq.com}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qq-hotpot.entrypoints=websecure"
      - "traefik.http.routers.qq-hotpot.rule=Host(`qqhotpotbbq.com`) || Host(`www.qqhotpotbbq.com`)"
      - "traefik.http.routers.qq-hotpot.tls.certresolver=letsencrypt"
      - "traefik.http.services.qq-hotpot.loadbalancer.server.port=3000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
