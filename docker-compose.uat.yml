# UAT stack — runs alongside production on the same VPS.
# Traefik routes uat.qqhotpotbbq.com → this stack.
# Own database, own volumes — completely isolated from production.
#
# First-time setup (run on VPS in /opt/qq-hotpot-uat):
#   cp .env.uat.example .env.uat
#   # edit .env.uat — fill POSTGRES_PASSWORD and AUTH_SECRET
#   docker compose -f docker-compose.uat.yml --project-name qq-uat up -d --build
#   docker compose -f docker-compose.uat.yml --project-name qq-uat exec app npx tsx prisma/seed.ts
#
# Update after code change:
#   git pull && docker compose -f docker-compose.uat.yml --project-name qq-uat up -d --build
#
# Full reset (wipes UAT database):
#   docker compose -f docker-compose.uat.yml --project-name qq-uat down -v
#   docker compose -f docker-compose.uat.yml --project-name qq-uat up -d --build
#   docker compose -f docker-compose.uat.yml --project-name qq-uat exec app npx tsx prisma/seed.ts

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_uat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-Asia/Yangon}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      APP_URL: https://uat.qqhotpotbbq.com
      NODE_OPTIONS: "--max-old-space-size=512"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qq-hotpot-uat.entrypoints=websecure"
      - "traefik.http.routers.qq-hotpot-uat.rule=Host(`uat.qqhotpotbbq.com`)"
      - "traefik.http.routers.qq-hotpot-uat.tls.certresolver=letsencrypt"
      - "traefik.http.services.qq-hotpot-uat.loadbalancer.server.port=3000"
    networks:
      - default
      - traefik-public
    volumes:
      - uploads_uat:/app/uploads

volumes:
  pgdata_uat:
  uploads_uat:

networks:
  traefik-public:
    external: true
